<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flugpreis-Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--paper:#F4F2EC;--card:#FFF;--ink:#22323C;--muted:#6C7680;--line:#E6E1D6;
 --accent:#2B4C7E;--brass:#A98B4B;--good:#2F7A57;--warn:#B4623A;--alert:#9B2D3A}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);
 font:14px/1.55 Inter,system-ui,sans-serif;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
.wrap{max-width:1240px;margin:0 auto;padding:0 28px 72px}
header{padding:40px 0 18px;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);font-weight:600}
h1{font-family:Fraunces,serif;font-weight:500;font-size:32px;margin:8px 0 3px}
.gen{color:var(--muted);font-size:13px}
button{font:inherit;cursor:pointer}
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:9px 15px}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.ghost{background:transparent}
.btn.danger{color:var(--alert);border-color:#E7CDD1}
.btn.small{padding:6px 10px;font-size:13px;border-radius:8px}
.tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px}
.tabs button{border:0;background:transparent;color:var(--muted);padding:9px 20px;border-radius:999px}
.tabs button.on{background:var(--ink);color:#fff}
.settings{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:18px 0 4px}
.settings summary{cursor:pointer;font-weight:600}
.frow{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
input,select{font:inherit;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 10px}
input[type=checkbox]{width:18px;height:18px}
.status{margin:14px 0;padding:12px 15px;border-radius:10px;font-size:13.5px;display:none}
.status.show{display:block}
.status.ok{background:#EAF2ED;color:var(--good)} .status.err{background:#FaEDEA;color:var(--alert)}
.status.info{background:#EEF2F7;color:var(--accent)}
/* overview */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:24px 0 6px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px}
.tile .k{font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.tile .v{font-family:Fraunces,serif;font-size:30px;font-weight:500;margin-top:10px;line-height:1}
.tile .s{font-size:12.5px;color:var(--muted);margin-top:8px}
.bar{display:flex;align-items:center;gap:16px;margin:30px 0 18px;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px}
.seg button{border:0;background:transparent;color:var(--muted);padding:8px 18px;border-radius:999px}
.seg button.on{background:var(--ink);color:#fff}
.sortwrap{margin-left:auto;display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13px}
.grid{display:grid;gap:22px;grid-template-columns:repeat(auto-fill,minmax(400px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;
 box-shadow:0 1px 2px rgba(34,50,60,.04),0 10px 30px rgba(34,50,60,.05)}
.c-top{display:flex;justify-content:space-between;gap:14px;margin-bottom:20px}
.trip{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--brass);font-weight:600}
.route{font-family:Fraunces,serif;font-size:22px;font-weight:500;margin:5px 0 3px}
.dates{color:var(--muted);font-size:13px}
.chip{font-size:11.5px;font-weight:500;padding:6px 11px;border-radius:999px;white-space:nowrap;border:1px solid transparent;flex:none;height:fit-content}
.chip.scheduled{background:#EEF2F7;color:var(--accent);border-color:#DEE6EF}
.chip.soon{background:#F7EDE6;color:var(--warn);border-color:#ECD9CB}
.chip.overdue{background:#F6E7E9;color:var(--alert);border-color:#EACDD1}
.chip.ticketed{background:#E9F1EC;color:var(--good);border-color:#D4E6DB}
.chip.monitor{background:#F1EFE9;color:var(--muted);border-color:var(--line)}
.mgn{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:18px}
.mgn .lbl{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.mgn .big{font-family:Fraunces,serif;font-size:30px;font-weight:600;margin-top:6px;line-height:1}
.mgn.plus{background:#F0F6F2}.mgn.plus .big{color:var(--good)}
.mgn.minus{background:#FBEEEA}.mgn.minus .big{color:var(--alert)}
.mgn.none{background:#F6F4EE}
.mgn .ctx{font-size:12.5px;color:var(--muted);margin-top:9px}.mgn .ctx b{color:var(--ink)}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px;margin:4px 0 18px}
.meta .mk{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.meta .mv{margin-top:3px}
.up{color:var(--warn)}.dn{color:var(--good)}
canvas{max-height:132px}
/* editor */
.ttrip{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-bottom:16px}
.thead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.tname{font-family:Fraunces,serif;font-size:20px;font-weight:500}
.dtable{width:100%;border-collapse:collapse;margin-top:6px}
.dtable th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:6px 8px}
.dtable td{padding:5px 8px;border-top:1px solid var(--line)}
.dtable input[type=text]{width:110px}.dtable input.num{width:64px}
.muted{color:var(--muted)} .empty{color:var(--muted);padding:40px 0}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 20px;align-items:center}
@media(max-width:760px){.summary{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style></head>
<body><div class="wrap">
<header>
  <div><div class="eyebrow">Fernreisen · Preisüberwachung</div>
    <h1>Flugpreis-Monitor</h1>
    <div class="gen" id="gen"></div></div>
  <div class="tabs"><button id="tab-view" class="on" onclick="showTab('view')">Übersicht</button>
    <button id="tab-edit" onclick="showTab('edit')">Verwalten</button></div>
</header>

<details class="settings" id="settings">
  <summary>Verbindung & Zugang</summary>
  <div class="frow">
    <div class="field"><label>GitHub-Konto</label><input id="s-owner" size="14"></div>
    <div class="field"><label>Repository</label><input id="s-repo" size="18"></div>
    <div class="field"><label>Branch</label><input id="s-branch" size="8"></div>
    <div class="field" style="flex:1;min-width:260px"><label>Zugangs-Token (nur zum Speichern nötig)</label>
      <input id="s-token" type="password" placeholder="github_pat_…"></div>
    <div class="field" style="justify-content:flex-end"><label>&nbsp;</label>
      <button class="btn primary" onclick="saveSettings()">Speichern</button></div>
  </div>
  <div class="gen" style="margin-top:12px">Der Token wird nur lokal in deinem Browser gespeichert und nur an GitHub gesendet. Fein-granularer Token mit Rechten <b>Contents: Read and write</b> und <b>Actions: Read and write</b> auf dieses Repo.</div>
</details>

<div class="status" id="status"></div>

<!-- OVERVIEW -->
<div id="view">
  <div class="summary" id="summary"></div>
  <div class="bar">
    <div class="seg" id="seg"></div>
    <div class="sortwrap"><label>Reise</label>
      <select id="fltrip" onchange="renderCards()"><option value="">alle Reisen</option></select>
      <label>Sortieren</label>
      <select id="sort" onchange="renderCards()">
        <option value="reise">nach Reise</option>
        <option value="marge">Marge (Verlust zuerst)</option>
        <option value="veraenderung">größte Veränderung</option>
        <option value="preis">nach Preis</option>
        <option value="deadline">Ticketing-Deadline</option>
      </select></div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- EDITOR -->
<div id="edit" style="display:none">
  <div class="toolbar">
    <button class="btn" onclick="addTrip()">+ Reise hinzufügen</button>
    <button class="btn primary" onclick="saveFlights(false)">Speichern</button>
    <button class="btn primary" onclick="saveFlights(true)">Speichern & jetzt aktualisieren</button>
    <button class="btn ghost small" onclick="loadFlights()">Neu laden</button>
    <span class="muted" id="editnote"></span>
  </div>
  <div id="trips"></div>
</div>

</div>
<script>
const DEFAULTS={owner:"jmrind",repo:"flugpreis-monitor",branch:"main"};
function cfg(){return {
  owner:localStorage.getItem('fpm_owner')||DEFAULTS.owner,
  repo:localStorage.getItem('fpm_repo')||DEFAULTS.repo,
  branch:localStorage.getItem('fpm_branch')||DEFAULTS.branch,
  token:localStorage.getItem('fpm_token')||''};}
function saveSettings(){
  localStorage.setItem('fpm_owner',document.getElementById('s-owner').value.trim());
  localStorage.setItem('fpm_repo',document.getElementById('s-repo').value.trim());
  localStorage.setItem('fpm_branch',document.getElementById('s-branch').value.trim()||'main');
  const t=document.getElementById('s-token').value.trim();
  if(t)localStorage.setItem('fpm_token',t);
  say('ok','Verbindung gespeichert.');init();
}
function fillSettings(){const c=cfg();
  document.getElementById('s-owner').value=c.owner;
  document.getElementById('s-repo').value=c.repo;
  document.getElementById('s-branch').value=c.branch;
  document.getElementById('s-token').value=c.token;}
function say(kind,msg){const s=document.getElementById('status');
  s.className='status show '+kind;s.textContent=msg;
  if(kind==='ok')setTimeout(()=>s.classList.remove('show'),4000);}

// --- GitHub helpers ---
function rawUrl(path){const c=cfg();
  return `https://raw.githubusercontent.com/${c.owner}/${c.repo}/${c.branch}/${path}?t=${Date.now()}`;}
function ghHeaders(){const c=cfg();const h={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};
  if(c.token)h['Authorization']='Bearer '+c.token;return h;}
function b64(str){return btoa(unescape(encodeURIComponent(str)));}
function unb64(str){return decodeURIComponent(escape(atob(str)));}
async function apiGet(path){const c=cfg();
  const r=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}?ref=${c.branch}`,{headers:ghHeaders()});
  if(!r.ok)throw new Error('GET '+path+' → '+r.status);
  const j=await r.json();return {sha:j.sha,text:unb64(j.content)};}
async function apiPut(path,text,sha,msg){const c=cfg();
  const r=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}`,{
    method:'PUT',headers:ghHeaders(),
    body:JSON.stringify({message:msg,content:b64(text),sha:sha,branch:c.branch})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error('Speichern fehlgeschlagen ('+r.status+') '+(e.message||''));}
  return r.json();}
async function dispatch(){const c=cfg();
  const r=await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/actions/workflows/monitor.yml/dispatches`,{
    method:'POST',headers:ghHeaders(),body:JSON.stringify({ref:c.branch})});
  if(!r.ok)throw new Error('Lauf-Auslösen fehlgeschlagen ('+r.status+')');}

// --- tabs ---
function showTab(t){document.getElementById('view').style.display=t==='view'?'':'none';
  document.getElementById('edit').style.display=t==='edit'?'':'none';
  document.getElementById('tab-view').classList.toggle('on',t==='view');
  document.getElementById('tab-edit').classList.toggle('on',t==='edit');
  if(t==='edit'&&!STATE.flights)loadFlights();}

// ===================== OVERVIEW =====================
let DATA=null,company='';
async function loadData(){
  try{const r=await fetch(rawUrl('data.json'));if(!r.ok)throw new Error(r.status);
    DATA=await r.json();}
  catch(e){document.getElementById('grid').innerHTML='<div class="empty">Noch keine Preisdaten gefunden. Nach dem nächsten Lauf erscheinen sie hier.</div>';return;}
  document.getElementById('gen').textContent='Stand '+DATA.generated+' · Preise & Kalkulation pro Gast in '+DATA.currency;
  const S=DATA.summary,am=S.avg_margin;
  document.getElementById('summary').innerHTML=`
   <div class="tile"><div class="k">Beobachtet</div><div class="v">${S.watched}</div><div class="s">Verbindungen</div></div>
   <div class="tile"><div class="k">Gebucht</div><div class="v">${S.booked}</div><div class="s">mit Ticketing-Frist</div></div>
   <div class="tile"><div class="k">Ø Marge / Gast</div><div class="v" style="color:${am==null?'var(--ink)':(am>=0?'var(--good)':'var(--alert)')}">${am==null?'—':(am>=0?'+':'')+am+' €'}</div><div class="s">kalkuliert − aktuell</div></div>
   <div class="tile"><div class="k">Nächste Deadline</div><div class="v" style="font-size:24px">${S.next_deadline}</div><div class="s">${S.next_deadline_sub}</div></div>`;
  const seg=document.getElementById('seg');seg.innerHTML='';
  ['alle',...new Set(DATA.cards.map(c=>c.company))].forEach((c,i)=>{
    const b=document.createElement('button');b.textContent=c;if(i===0)b.classList.add('on');
    b.onclick=()=>{seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
      company=(c==='alle'?'':c);fillTrips();renderCards();};seg.appendChild(b);});
  fillTrips();renderCards();
}
function fillTrips(){const sel=document.getElementById('fltrip'),cur=sel.value;
  const trips=[...new Set(DATA.cards.filter(c=>!company||c.company===company).map(c=>c.trip))].sort();
  sel.innerHTML='<option value="">alle Reisen</option>'+trips.map(t=>`<option>${t}</option>`).join('');
  if(trips.includes(cur))sel.value=cur;}
function renderCards(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  const trip=document.getElementById('fltrip').value,s=document.getElementById('sort').value;
  let items=DATA.cards.filter(c=>(!company||c.company===company)&&(!trip||c.trip===trip));
  const cmp={reise:(a,b)=>(a.company+a.trip).localeCompare(b.company+b.trip)||a.dep_iso.localeCompare(b.dep_iso),
    marge:(a,b)=>(a.margin??1e9)-(b.margin??1e9),
    veraenderung:(a,b)=>Math.abs(b.change_last??0)-Math.abs(a.change_last??0),
    preis:(a,b)=>a.current-b.current,
    deadline:(a,b)=>(a.booked?a.days_left:1e9)-(b.booked?b.days_left:1e9)}[s];
  items=[...items].sort(cmp);
  if(!items.length){grid.innerHTML='<div class="empty">Keine Strecken für diese Auswahl.</div>';return;}
  items.forEach(c=>{
    const mcls=c.margin==null?'none':(c.margin>=0?'plus':'minus');
    const mtxt=c.margin==null?'—':(c.margin>=0?'+'+c.margin+' €':c.margin+' €');
    const mlbl=c.margin==null?'keine Kalkulation':(c.margin>=0?'Puffer / Gast':'Verlust / Gast');
    const chg=c.change_last==null?'<span class="muted">neu</span>':
      (c.change_last<=0?`<span class="dn">▼ ${c.change_last} €</span>`:`<span class="up">▲ +${c.change_last} €</span>`);
    const el=document.createElement('div');el.className='card';
    el.innerHTML=`<div class="c-top"><div><div class="trip">${c.company} · ${c.trip}</div>
      <div class="route">${c.route}</div>
      <div class="dates">${c.dep}${c.ret?' – '+c.ret:''}${c.kind!=='roundtrip'?' · '+c.kind:''}</div></div>
      <span class="chip ${c.state}">${c.state_label}</span></div>
      <div class="mgn ${mcls}"><div class="lbl">${mlbl}</div><div class="big">${mtxt}</div>
        <div class="ctx">Aktuell <b>${c.current} €</b>${c.calc?` · kalkuliert <b>${c.calc} €</b>`:''} · Gäste <b>${c.pax}</b></div></div>
      <div class="meta"><div><div class="mk">Schnitt</div><div class="mv">${c.avg} €</div></div>
        <div><div class="mk">Spanne</div><div class="mv">${c.min} – ${c.max} €</div></div>
        <div><div class="mk">seit letzter Messung</div><div class="mv">${chg}</div></div>
        <div><div class="mk">Messungen</div><div class="mv">${c.n}</div></div></div>
      <canvas id="cv_${c.slug.replace(/[^a-zA-Z0-9]/g,'_')}"></canvas>`;
    grid.appendChild(el);
    new Chart(el.querySelector('canvas'),{type:'line',
      data:{labels:c.labels,datasets:[
        {data:c.values,borderColor:'#2B4C7E',backgroundColor:'rgba(43,76,126,.08)',fill:true,tension:.3,pointRadius:0,borderWidth:2},
        ...(c.calc?[{data:c.values.map(()=>c.calc),borderColor:'#A98B4B',borderDash:[5,4],pointRadius:0,borderWidth:1.5}]:[])]},
      options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:x=>x.datasetIndex===1?('Kalkulation '+x.parsed.y+' €'):(x.parsed.y+' €')}}},
        scales:{x:{ticks:{color:'#9AA0A6',maxTicksLimit:5,font:{size:10}},grid:{display:false}},
          y:{ticks:{color:'#9AA0A6',maxTicksLimit:4,font:{size:10}},grid:{color:'#EFEBE1'}}}}});
  });
}

// ===================== EDITOR =====================
const STATE={flights:null,sha:null};
async function loadFlights(){
  const c=cfg();
  document.getElementById('editnote').textContent='lädt…';
  try{
    if(c.token){const g=await apiGet('flights.json');STATE.sha=g.sha;STATE.flights=JSON.parse(g.text);}
    else{const r=await fetch(rawUrl('flights.json'));STATE.flights=await r.json();STATE.sha=null;}
    if(!STATE.flights.trips)STATE.flights.trips=[];
    renderTrips();
    document.getElementById('editnote').textContent=c.token?'':'Nur-Lesen: für Speichern oben einen Token eintragen.';
  }catch(e){say('err','Konnte flights.json nicht laden: '+e.message);}
}
function renderTrips(){
  const wrap=document.getElementById('trips');wrap.innerHTML='';
  if(!STATE.flights.trips.length){wrap.innerHTML='<div class="empty">Noch keine Reisen. Oben „+ Reise hinzufügen".</div>';return;}
  STATE.flights.trips.forEach((t,ti)=>{
    const el=document.createElement('div');el.className='ttrip';
    el.innerHTML=`<div class="thead"><div class="tname">${t.name||'Neue Reise'}</div>
      <button class="btn danger small" onclick="delTrip(${ti})">Reise löschen</button></div>
      <div class="frow">
        <div class="field"><label>Name</label><input value="${t.name||''}" oninput="upd(${ti},'name',this.value)"></div>
        <div class="field"><label>Firma</label><input value="${t.company||'Samsara'}" oninput="upd(${ti},'company',this.value)"></div>
        <div class="field"><label>Ab (IATA)</label><input class="num" value="${t.origin||''}" oninput="upd(${ti},'origin',this.value.toUpperCase())"></div>
        <div class="field"><label>Nach (IATA)</label><input class="num" value="${t.destination||''}" oninput="upd(${ti},'destination',this.value.toUpperCase())"></div>
        <div class="field"><label>Rück ab (IATA)</label><input class="num" value="${t.return_origin||''}" oninput="upd(${ti},'return_origin',this.value.toUpperCase())"></div>
        <div class="field"><label>Airlines (Komma)</label><input value="${(t.carriers||[]).join(',')}" oninput="updCarriers(${ti},this.value)"></div>
        <div class="field"><label>Stops</label><select onchange="upd(${ti},'max_stops',this.value===''?null:Number(this.value))">
          <option value="0"${t.max_stops===0?' selected':''}>nonstop</option>
          <option value="1"${t.max_stops===1?' selected':''}>max 1</option>
          <option value=""${t.max_stops==null?' selected':''}>egal</option></select></div>
        <div class="field"><label>Klasse</label><select onchange="upd(${ti},'cabin',this.value)">
          ${['economy','premium_economy','business'].map(x=>`<option${t.cabin===x?' selected':''}>${x}</option>`).join('')}</select></div>
        <div class="field"><label>Kalkul. €/Gast</label><input class="num" value="${t.calc_price??''}" oninput="upd(${ti},'calc_price',this.value===''?null:Number(this.value))"></div>
      </div>
      <table class="dtable"><thead><tr><th>Hinflug</th><th>Rückflug</th><th>Gäste</th><th>gebucht</th><th>Tickets aus.</th><th></th></tr></thead>
      <tbody>${(t.dates||[]).map((d,di)=>`<tr>
        <td><input type="text" value="${d.depart||''}" oninput="updDate(${ti},${di},'depart',this.value)" placeholder="TT.MM.JJJJ"></td>
        <td><input type="text" value="${d.return||''}" oninput="updDate(${ti},${di},'return',this.value)" placeholder="TT.MM.JJJJ"></td>
        <td><input class="num" type="text" value="${d.pax??''}" oninput="updDate(${ti},${di},'pax',this.value===''?null:Number(this.value))"></td>
        <td><input type="checkbox" ${d.booked?'checked':''} onchange="updDate(${ti},${di},'booked',this.checked)"></td>
        <td><input type="checkbox" ${d.ticketed?'checked':''} onchange="updDate(${ti},${di},'ticketed',this.checked)"></td>
        <td><button class="btn danger small" onclick="delDate(${ti},${di})">✕</button></td></tr>`).join('')}</tbody></table>
      <button class="btn ghost small" style="margin-top:10px" onclick="addDate(${ti})">+ Termin</button>`;
    wrap.appendChild(el);
  });
}
function upd(ti,k,v){STATE.flights.trips[ti][k]=v;if(k==='name')renderTrips();}
function updCarriers(ti,v){STATE.flights.trips[ti].carriers=v.split(',').map(x=>x.trim().toUpperCase()).filter(Boolean);}
function updDate(ti,di,k,v){const d=STATE.flights.trips[ti].dates[di];
  if((k==='booked'||k==='ticketed')&&!v)delete d[k];
  else if(k==='pax'&&v==null)delete d[k];
  else d[k]=v;}
function addTrip(){STATE.flights.trips.push({company:'Samsara',name:'Neue Reise',origin:'FRA',
  destination:'',return_origin:'',carriers:[],max_stops:0,cabin:'economy',checked_bag:true,calc_price:null,dates:[]});renderTrips();}
function delTrip(ti){if(confirm('Reise wirklich löschen?')){STATE.flights.trips.splice(ti,1);renderTrips();}}
function addDate(ti){STATE.flights.trips[ti].dates.push({depart:'',return:''});renderTrips();}
function delDate(ti,di){STATE.flights.trips[ti].dates.splice(di,1);renderTrips();}

async function saveFlights(alsoRun){
  const c=cfg();
  if(!c.token){say('err','Zum Speichern brauchst du oben unter „Verbindung & Zugang" einen Token.');return;}
  try{
    say('info','Speichere…');
    const g=await apiGet('flights.json');           // frischen sha holen
    const text=JSON.stringify(STATE.flights,null,2);
    await apiPut('flights.json',text,g.sha,'flights.json über Bedienpanel aktualisiert');
    STATE.sha=null;
    if(alsoRun){await dispatch();say('ok','Gespeichert. Ein Lauf wurde gestartet — die Übersicht aktualisiert sich in ein paar Minuten.');}
    else{say('ok','Gespeichert. Wird beim nächsten Lauf übernommen.');}
  }catch(e){say('err',e.message);}
}

// --- init ---
function init(){fillSettings();loadData();if(document.getElementById('edit').style.display!=='none')loadFlights();}
init();
</script></body></html>
